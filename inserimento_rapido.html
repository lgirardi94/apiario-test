<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Apiario — Inserimento rapido</title>
<link rel="stylesheet" href="style-mobile.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="shared.js"></script>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🐝</span>
  <h1>Apiario — Inserimento rapido</h1>
  <div class="drive-dot" id="driveDot" title="Google Drive"></div>
</header>

<!-- LOGIN SCREEN -->
<div id="driveLoginScreen">
  <div class="bee">🐝</div>
  <h2>Connetti Google Drive</h2>
  <p>Accedi con il tuo account Google per sincronizzare i dati con l'apiario principale.</p>
  <button class="btn-google" onclick="driveLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Accedi con Google
  </button>
</div>

<!-- APP CONTENT -->
<div id="appContent" style="display:none">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('riepilogo', this)">
      <span class="tab-icon">📊</span>Riepilogo
    </button>
    <button class="tab-btn" onclick="showTab('contabilita', this)">
      <span class="tab-icon">💰</span>Contabilità
    </button>
    <button class="tab-btn" onclick="showTab('magazzino', this)">
      <span class="tab-icon">📦</span>Magazzino
    </button>
  </div>

  <div class="content">

    <!-- RIEPILOGO -->
    <div class="section active" id="tabRiepilogo">
      <div id="riepilogoContent">
        <div style="color:var(--text-light);font-style:italic;font-size:0.9rem;text-align:center;padding:2rem">Caricamento...</div>
      </div>
    </div>

    <!-- CONTABILITÀ -->
    <div class="section" id="tabContabilita">
      <div id="formContSuccess" class="success-anim">
        <div class="success-icon">✅</div>
        <h3>Salvato!</h3>
        <p id="formContSuccessMsg"></p>
        <button class="btn-another" onclick="resetFormCont()">+ Inserisci un altro</button>
      </div>
      <div id="formCont">
        <div class="form-group" style="margin-bottom:0.8rem">
          <label>Tipo movimento</label>
          <div class="tipo-toggle">
            <button class="tipo-toggle-btn active-entrata" id="btnEntrata" onclick="setTipoCont('entrata')">🟢 Entrata</button>
            <button class="tipo-toggle-btn" id="btnUscita" onclick="setTipoCont('uscita')">🔴 Uscita</button>
          </div>
        </div>
        <div class="form-group">
          <label>Importo (€)</label>
          <div class="importo-wrap">
            <span class="euro">€</span>
            <input type="number" id="contImporto" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>
        <div class="form-group">
          <label>Descrizione</label>
          <input type="text" id="contDesc" placeholder="Es. Vendita 10 vasi acacia...">
        </div>
        <div class="form-group">
          <label>Categorie</label>
          <div class="chips-wrap" id="contCatChips"></div>
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="contData">
        </div>
        <div class="form-group">
          <label>Note (opzionale)</label>
          <textarea id="contNote" placeholder="Cliente, evento, fornitore..."></textarea>
        </div>
        <button class="btn-submit" id="btnSaveCont" onclick="saveContabilita()">💾 Salva movimento</button>
      </div>
    </div>

    <!-- MAGAZZINO -->
    <div class="section" id="tabMagazzino">
      <div id="formMagSuccess" class="success-anim">
        <div class="success-icon">✅</div>
        <h3>Salvato!</h3>
        <p id="formMagSuccessMsg"></p>
        <button class="btn-another" onclick="resetFormMag()">+ Inserisci un altro</button>
      </div>
      <div id="formMag">
        <div class="form-group">
          <label>Tipo movimento</label>
          <div class="tipo-toggle">
            <button class="tipo-toggle-btn active-entrata" id="btnMagIn" onclick="setTipoMag('entrata')">➕ Entrata</button>
            <button class="tipo-toggle-btn" id="btnMagOut" onclick="setTipoMag('uscita')">➖ Uscita</button>
          </div>
        </div>
        <div class="form-group">
          <label>Articolo</label>
          <select id="magArticolo" onchange="onArticoloChange()">
            <option value="">— Seleziona articolo —</option>
          </select>
          <div id="giacenzaInfo" style="margin-top:0.4rem"></div>
        </div>
        <div class="form-group">
          <label>Quantità <span id="magUnitaLabel" style="font-weight:400;text-transform:none;letter-spacing:0"></span></label>
          <input type="number" id="magQta" inputmode="decimal" placeholder="Es. 10" min="0" step="0.1">
        </div>

        <!-- AVVISO USCITA con conferma -->
        <div class="avviso-uscita" id="avvisoUscita">
          <strong>⚠️ Scorta insufficiente</strong>
          <span id="avvisoMsg"></span>
          <div class="avviso-buttons">
            <button class="btn-cancel-avviso" onclick="cancelAvviso()">Annulla</button>
            <button class="btn-confirm-anyway" onclick="confirmSaveMag()">Salva comunque</button>
          </div>
        </div>

        <div class="form-group">
          <label>Data</label>
          <input type="date" id="magData">
        </div>
        <div class="form-group">
          <label>Note (opzionale)</label>
          <input type="text" id="magNote" placeholder="Es. acquisto fiera, utilizzo apiario...">
        </div>
        <button class="btn-submit" id="btnSaveMag" onclick="saveMagazzinoWithValidation()">💾 Salva movimento</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let dbData   = { arnie: [], logBook: [] };
let magData  = { articoli: [], movimentazioni: [] };
let contData = { movimentiContabili: [] };
let tipoContabile = 'entrata';
let tipoMagazzino = 'entrata';
let pendingMagMov = null;

// ===== TOAST =====
function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== LOADING / LOGIN SCREEN =====
function showLoadingScreen(msg) {
  document.getElementById('driveLoginScreen').innerHTML = `
    <div class="spinner"></div>
    <h2 style="color:var(--brown)">${msg}</h2>
    <p style="color:var(--text-light)">Connessione a Google Drive...</p>
  `;
}

function showLoginScreen() {
  document.getElementById('driveLoginScreen').innerHTML = `
    <div class="bee">🐝</div>
    <h2>Connetti Google Drive</h2>
    <p>Accedi con il tuo account Google per sincronizzare i dati con l'apiario principale.</p>
    <button class="btn-google" onclick="driveLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Accedi con Google
    </button>
  `;
}

// ===== DRIVE INIT =====
window.addEventListener('load', () => {
  setTimeout(() => {
    initDrive(
      async () => {
        showLoadingScreen('🔄 Caricamento dati...');
        try {
          const { db, mag, cont } = await driveLoadAll();
          if(db)   dbData   = db;
          if(mag)  magData  = mag;
          if(cont) contData = cont;
        } catch(e) { console.error(e); }
        showApp();
      },
      () => showLoadingScreen('🔄 Caricamento dati...'),
      () => showLoginScreen()
    );
  }, 600);
});

function showApp() {
  document.getElementById('driveLoginScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  document.getElementById('driveDot').classList.add('connected');
  document.getElementById('contData').value = today();
  document.getElementById('magData').value  = today();
  renderCatChips();
  populateMagArticoli();
  renderRiepilogo();
}

// ===== TABS =====
function showTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  btn.classList.add('active');
  if(tab === 'riepilogo') renderRiepilogo();
  if(tab === 'magazzino') populateMagArticoli();
}

// ===== RIEPILOGO =====
function renderRiepilogo() {
  const anno = new Date().getFullYear();
  const mc  = contData.movimentiContabili || [];
  const mv  = magData.movimentazioni || [];
  const art = magData.articoli || [];

  const entAnno = mc.filter(m => m.tipo==='entrata' && m.data && m.data.startsWith(anno))
    .reduce((s,m) => s + parseFloat(m.importo||0), 0);
  const uscAnno = mc.filter(m => m.tipo==='uscita' && m.data && m.data.startsWith(anno))
    .reduce((s,m) => s + parseFloat(m.importo||0), 0);
  const saldo = entAnno - uscAnno;

  const sottoSoglia = art.filter(a => a.soglia && getGiacenza(a.id, mv) <= parseFloat(a.soglia));

  const recentCont = mc.slice().sort((a,b) => b.data.localeCompare(a.data)).slice(0,5).map(m => ({
    tipo: m.tipo, val: (m.tipo==='entrata'?'+':'−')+'€'+fmt(m.importo),
    valClass: m.tipo==='entrata'?'green':'red',
    desc: m.descrizione||'—', date: formatDate(m.data),
    icon: m.tipo==='entrata'?'💰':'💸'
  }));

  const recentMag = mv.slice().sort((a,b) => b.data.localeCompare(a.data)).slice(0,5).map(m => {
    const a = art.find(x => x.id === m.articoloId);
    return {
      tipo: m.tipo==='entrata'?'mag-in':'mag-out',
      val: (m.tipo==='entrata'?'+':'−') + parseFloat(m.qta||0) + ' ' + (a?.unita||''),
      valClass: m.tipo==='entrata'?'blue':'amber',
      desc: a?.nome||'—', date: formatDate(m.data), icon: '📦'
    };
  });

  document.getElementById('riepilogoContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:1rem">
      <div class="info-card">
        <div class="info-card-title">Saldo ${anno}</div>
        <div class="info-card-val ${saldo>=0?'green':'red'}">${saldo>=0?'+':''}€${fmt(saldo)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Entrate ${anno}</div>
        <div class="info-card-val green">+€${fmt(entAnno)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Uscite ${anno}</div>
        <div class="info-card-val red">−€${fmt(uscAnno)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Arnie attive</div>
        <div class="info-card-val amber">${(dbData.arnie||[]).filter(a=>a.status==='attiva').length}</div>
      </div>
    </div>
    ${sottoSoglia.length > 0 ? `
      <div style="background:#fce8e8;border:1px solid var(--red);border-radius:8px;padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.88rem;color:var(--red)">
        ⚠️ <strong>Scorte sotto soglia:</strong> ${sottoSoglia.map(a=>a.nome).join(', ')}
      </div>` : ''}
    <div class="section-label">Ultimi movimenti contabili</div>
    <div class="recent-list">
      ${recentCont.length === 0
        ? '<div style="color:var(--text-light);font-style:italic;font-size:0.88rem;padding:0.5rem">Nessun movimento.</div>'
        : recentCont.map(m => `
          <div class="recent-item ${m.tipo}">
            <span style="font-size:1.2rem">${m.icon}</span>
            <div class="recent-item-info">
              <div class="recent-item-desc">${m.desc}</div>
              <div class="recent-item-date">${m.date}</div>
            </div>
            <span class="recent-item-val ${m.valClass}">${m.val}</span>
          </div>`).join('')}
    </div>
    <div class="section-label" style="margin-top:1.2rem">Ultimi movimenti magazzino</div>
    <div class="recent-list">
      ${recentMag.length === 0
        ? '<div style="color:var(--text-light);font-style:italic;font-size:0.88rem;padding:0.5rem">Nessun movimento.</div>'
        : recentMag.map(m => `
          <div class="recent-item ${m.tipo}">
            <span style="font-size:1.2rem">${m.icon}</span>
            <div class="recent-item-info">
              <div class="recent-item-desc">${m.desc}</div>
              <div class="recent-item-date">${m.date}</div>
            </div>
            <span class="recent-item-val ${m.valClass}">${m.val}</span>
          </div>`).join('')}
    </div>
  `;
}

// ===== CONTABILITÀ =====
function setTipoCont(tipo) {
  tipoContabile = tipo;
  document.getElementById('btnEntrata').className = 'tipo-toggle-btn' + (tipo==='entrata'?' active-entrata':'');
  document.getElementById('btnUscita').className  = 'tipo-toggle-btn' + (tipo==='uscita'?' active-uscita':'');
  renderCatChips();
}

function renderCatChips() {
  const cats = tipoContabile === 'entrata' ? CAT_ENTRATA : CAT_USCITA;
  document.getElementById('contCatChips').innerHTML = cats.map(c =>
    `<label class="chip"><input type="checkbox" value="${c.id}">${c.label}</label>`
  ).join('');
  document.querySelectorAll('#contCatChips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected', chip.querySelector('input').checked);
    });
  });
}

async function saveContabilita() {
  const importo = document.getElementById('contImporto').value;
  const desc    = document.getElementById('contDesc').value.trim();
  const data    = document.getElementById('contData').value;
  if(!importo || !desc || !data) { showToast('⚠️ Compila importo, descrizione e data'); return; }
  const categorie = Array.from(document.querySelectorAll('#contCatChips input:checked')).map(x => x.value);
  const mov = {
    id: Date.now().toString(), data,
    tipo: tipoContabile,
    descrizione: desc,
    importo: parseFloat(importo),
    categorie,
    note: document.getElementById('contNote').value.trim()
  };
  const btn = document.getElementById('btnSaveCont');
  btn.disabled = true;
  btn.textContent = '⏳ Salvataggio...';
  try {
    if(!contData.movimentiContabili) contData.movimentiContabili = [];
    contData.movimentiContabili.unshift(mov);
    contData.savedAt = new Date().toISOString();
    await driveWriteFile(FILENAME_CONT, contData);
    document.getElementById('formContSuccessMsg').textContent =
      `${tipoContabile==='entrata'?'+':'−'}€${fmt(mov.importo)} — ${desc}`;
    document.getElementById('formCont').style.display = 'none';
    document.getElementById('formContSuccess').classList.add('show');
  } catch(e) {
    showToast('❌ Errore: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salva movimento';
  }
}

function resetFormCont() {
  document.getElementById('formContSuccess').classList.remove('show');
  document.getElementById('formCont').style.display = 'block';
  document.getElementById('contImporto').value = '';
  document.getElementById('contDesc').value = '';
  document.getElementById('contNote').value = '';
  document.getElementById('contData').value = today();
  renderCatChips();
  document.getElementById('contImporto').focus();
}

// ===== MAGAZZINO =====
function populateMagArticoli() {
  const sel  = document.getElementById('magArticolo');
  const arts = magData.articoli || [];
  sel.innerHTML = '<option value="">— Seleziona articolo —</option>' +
    arts.map(a => `<option value="${a.id}" data-unita="${a.unita}">${a.nome} (${a.unita})</option>`).join('');
  document.getElementById('giacenzaInfo').innerHTML = '';
  document.getElementById('avvisoUscita').classList.remove('show');
}

function setTipoMag(tipo) {
  tipoMagazzino = tipo;
  document.getElementById('btnMagIn').className  = 'tipo-toggle-btn' + (tipo==='entrata'?' active-entrata':'');
  document.getElementById('btnMagOut').className = 'tipo-toggle-btn' + (tipo==='uscita'?' active-uscita':'');
  document.getElementById('avvisoUscita').classList.remove('show');
  onArticoloChange();
}

function onArticoloChange() {
  const sel   = document.getElementById('magArticolo');
  const artId = sel.value;
  const opt   = sel.options[sel.selectedIndex];
  const unita = opt?.dataset?.unita || '';
  document.getElementById('magUnitaLabel').textContent = unita ? `(${unita})` : '';
  document.getElementById('avvisoUscita').classList.remove('show');
  if(!artId) { document.getElementById('giacenzaInfo').innerHTML = ''; return; }

  const giac = getGiacenza(artId, magData.movimentazioni || []);
  const art  = (magData.articoli||[]).find(a => a.id === artId);
  const cls  = giac === 0 ? 'empty' : (art?.soglia && giac <= parseFloat(art.soglia) ? 'warn' : 'ok');
  document.getElementById('giacenzaInfo').innerHTML =
    `<span class="giacenza-badge ${cls}">Giacenza attuale: ${giac % 1 === 0 ? giac : giac.toFixed(1)} ${unita}</span>`;
}

function saveMagazzinoWithValidation() {
  const artId = document.getElementById('magArticolo').value;
  const qta   = parseFloat(document.getElementById('magQta').value);
  const data  = document.getElementById('magData').value;
  if(!artId || !qta || !data) { showToast('⚠️ Seleziona articolo, quantità e data'); return; }

  // Validazione scarico: avviso con conferma (opzione B)
  if(tipoMagazzino === 'uscita') {
    const giac = getGiacenza(artId, magData.movimentazioni || []);
    if(qta > giac) {
      const art   = (magData.articoli||[]).find(a => a.id === artId);
      const unita = art?.unita || '';
      const giacFmt = giac % 1 === 0 ? giac : giac.toFixed(1);
      document.getElementById('avvisoMsg').textContent =
        ` Stai scaricando ${qta} ${unita} ma la giacenza è di ${giacFmt} ${unita}. Continuare metterà la giacenza in negativo.`;
      document.getElementById('avvisoUscita').classList.add('show');
      pendingMagMov = { artId, qta, data };
      return;
    }
  }
  doSaveMag();
}

function cancelAvviso() {
  document.getElementById('avvisoUscita').classList.remove('show');
  pendingMagMov = null;
}

function confirmSaveMag() {
  document.getElementById('avvisoUscita').classList.remove('show');
  doSaveMag();
}

async function doSaveMag() {
  const artId = document.getElementById('magArticolo').value;
  const qta   = parseFloat(document.getElementById('magQta').value);
  const data  = document.getElementById('magData').value;
  const art   = (magData.articoli||[]).find(a => a.id === artId);
  const mov = {
    id: Date.now().toString(), data,
    articoloId: artId,
    tipo: tipoMagazzino,
    qta,
    note: document.getElementById('magNote').value.trim()
  };
  const btn = document.getElementById('btnSaveMag');
  btn.disabled = true;
  btn.textContent = '⏳ Salvataggio...';
  try {
    if(!magData.movimentazioni) magData.movimentazioni = [];
    magData.movimentazioni.push(mov);
    magData.savedAt = new Date().toISOString();
    await driveWriteFile(FILENAME_MAG, magData);
    document.getElementById('formMagSuccessMsg').textContent =
      `${tipoMagazzino==='entrata'?'+':'−'}${qta} ${art?.unita||''} di ${art?.nome||'—'}`;
    document.getElementById('formMag').style.display = 'none';
    document.getElementById('formMagSuccess').classList.add('show');
    pendingMagMov = null;
  } catch(e) {
    showToast('❌ Errore: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salva movimento';
  }
}

function resetFormMag() {
  document.getElementById('formMagSuccess').classList.remove('show');
  document.getElementById('formMag').style.display = 'block';
  document.getElementById('magQta').value = '';
  document.getElementById('magNote').value = '';
  document.getElementById('magData').value = today();
  document.getElementById('magArticolo').value = '';
  document.getElementById('magUnitaLabel').textContent = '';
  document.getElementById('giacenzaInfo').innerHTML = '';
  document.getElementById('avvisoUscita').classList.remove('show');
  pendingMagMov = null;
}
</script>
</body>
</html>
